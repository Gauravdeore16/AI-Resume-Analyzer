# Server Port
server.port=8080

# ----------------------------------------------------
# DATABASE CONFIGURATION (H2 In-Memory Fallback - Default)
# ----------------------------------------------------
spring.datasource.url=jdbc:h2:mem:resumedb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ----------------------------------------------------
# DATABASE CONFIGURATION (MySQL - Production)
# To use a local MySQL server, comment out the H2 section above
# and uncomment the properties below. Make sure to update credentials.
# ----------------------------------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/resume_analyzer_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ----------------------------------------------------
# FILE UPLOAD LIMITS
# ----------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ----------------------------------------------------
# SECURITY & JWT CONFIGURATION
# ----------------------------------------------------
ai.app.jwtSecret=aiResumeAnalyzerSuperSecretSecureSigningKey12345678901234567890
ai.app.jwtExpirationMs=86400000

# ----------------------------------------------------
# GEMINI AI CONFIGURATION
# ----------------------------------------------------
# Supply your Gemini API key here or define the GEMINI_API_KEY environment variable.
gemini.api.key=${GEMINI_API_KEY:}
